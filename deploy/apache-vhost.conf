<VirtualHost *:80>
    ServerName helpdesk.example.nl
    DocumentRoot /var/www/ticket-systeem/public

    <Directory /var/www/ticket-systeem/public>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/ticket-systeem>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ticket-systeem-error.log
    CustomLog ${APACHE_LOG_DIR}/ticket-systeem-access.log combined
</VirtualHost>
